name: Build JAR

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 7
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'   # supports older Java versions
          java-version: '7'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: my-jar
          path: target/*.jar